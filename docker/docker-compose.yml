# =============================================================================
# perspective_grasp - Docker Compose (ML nodes only)
#
# Host runs: C++ nodes, camera drivers, ur5e controller, RViz2, YOLO
# Docker runs: GPU-heavy Python ML nodes with complex dependencies
#
# Usage (from repo root):
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml up foundationpose -d
#   docker compose -f docker/docker-compose.yml logs -f foundationpose
#   docker compose -f docker/docker-compose.yml down
#
# Or from this directory:
#   cd docker && docker compose build
#
# Model weights:
#   Set env vars or place weights in <repo_root>/models/<service>/
#   e.g., export FOUNDATIONPOSE_WEIGHTS=/path/to/weights
# =============================================================================

x-gpu-common: &gpu-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
    target: ml-base
  image: perspective_grasp/ml-base:latest
  network_mode: host
  ipc: host
  restart: unless-stopped
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  environment: &gpu-env
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: all
    ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}

services:
  # -----------------------------------------------------------------------
  # FoundationPose — NVIDIA FoundationPose 6D tracker
  # Needs: PyTorch 2.6 + kaolin 0.17 + nvdiffrast 0.3.3 (built in stage)
  # Weights mount: $FOUNDATIONPOSE_WEIGHTS → /ws/models/foundationpose
  #   expected layout:
  #     meshes/<class_name>.(obj|ply|stl)   # one mesh per YOLO class
  #     weights/                            # FoundationPose refiner/scorer
  # FOUNDATIONPOSE_CAMERA_CONFIG selects the camera topology:
  #   unset / empty  → one non-namespaced /foundationpose_tracker (1-cam)
  #   /ws/config/camera_config_2cam.yaml → /cam0 + /cam1 fan-out
  #   /ws/config/camera_config.yaml      → /cam0 + /cam1 + /cam2 fan-out
  # -----------------------------------------------------------------------
  foundationpose:
    <<: *gpu-common
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: foundationpose-runtime
    image: perspective_grasp/foundationpose:latest
    container_name: pg_foundationpose
    volumes:
      - ../packages/phase4_refinement/isaac_foundationpose_tracker:/ws/src/isaac_foundationpose_tracker
      - ../packages/bringup/perception_bringup/config:/ws/config:ro
      - ${FOUNDATIONPOSE_WEIGHTS:-../models/foundationpose}:/ws/models/foundationpose
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        cd /ws && colcon build --packages-select isaac_foundationpose_tracker &&
        source /ws/install/setup.bash &&
        echo '[FoundationPose] Container ready.' &&
        ros2 launch isaac_foundationpose_tracker foundationpose.launch.py ${FOUNDATIONPOSE_CAMERA_CONFIG:+camera_config:=$FOUNDATIONPOSE_CAMERA_CONFIG}
      "

  # -----------------------------------------------------------------------
  # CosyPose — scene-level multi-object pose optimization (action server)
  # Needs: happypose (CosyPose branch), PyTorch 2.6 + CUDA 12.6 + PyTorch3D.
  # Uses the shared `cosypose-runtime` Dockerfile target (same image the
  # megapose service below uses, since happypose bundles both).
  # Weights mount: $HAPPYPOSE_WEIGHTS → /ws/models/happypose
  #   expected layout:
  #     bop_datasets/<dataset>/...         # BOP-formatted object set
  #     experiments/<coarse_run_id>/...    # coarse estimator weights
  #     experiments/<refiner_run_id>/...   # refiner weights
  # Meshes mount: $MEGAPOSE_MESHES → /ws/models/megapose/meshes
  #   happypose builds a RigidObjectDataset from this flat dir at
  #   load(); shared with the megapose service to avoid duplication.
  # COSYPOSE_CAMERA_CONFIG selects the camera topology:
  #   unset / empty  → one non-namespaced /cosypose_optimizer (1-cam)
  #   /ws/config/camera_config_2cam.yaml → /cam0 + /cam1 fan-out
  #   /ws/config/camera_config.yaml      → /cam0 + /cam1 + /cam2 fan-out
  # -----------------------------------------------------------------------
  cosypose:
    <<: *gpu-common
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: cosypose-runtime
    image: perspective_grasp/cosypose:latest
    container_name: pg_cosypose
    volumes:
      - ../packages/phase4_refinement/cosypose_scene_optimizer:/ws/src/cosypose_scene_optimizer
      - ../packages/bringup/perception_bringup/config:/ws/config:ro
      - ${HAPPYPOSE_WEIGHTS:-../models/happypose}:/ws/models/happypose
      - ${MEGAPOSE_MESHES:-../models/megapose/meshes}:/ws/models/megapose/meshes
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        cd /ws && colcon build --packages-select cosypose_scene_optimizer &&
        source /ws/install/setup.bash &&
        echo '[CosyPose] Container ready.' &&
        ros2 launch cosypose_scene_optimizer cosypose.launch.py ${COSYPOSE_CAMERA_CONFIG:+camera_config:=$COSYPOSE_CAMERA_CONFIG}
      "

  # -----------------------------------------------------------------------
  # MegaPose — RGB-only zero-shot 6D pose estimation (lifecycle node)
  # Shares the `cosypose-runtime` target because happypose bundles
  # CosyPose + MegaPose under one install — no point building twice.
  # Weights mount: $HAPPYPOSE_WEIGHTS → /ws/models/happypose
  #                $MEGAPOSE_MESHES   → /ws/models/megapose/meshes
  #   expected mesh layout:
  #     <class_name>.(obj|ply|stl)         # flat, one mesh per YOLO class
  # MEGAPOSE_CAMERA_CONFIG selects the camera topology (same contract).
  # -----------------------------------------------------------------------
  megapose:
    <<: *gpu-common
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: cosypose-runtime
    image: perspective_grasp/cosypose:latest
    container_name: pg_megapose
    volumes:
      - ../packages/phase4_refinement/megapose_ros2_wrapper:/ws/src/megapose_ros2_wrapper
      - ../packages/bringup/perception_bringup/config:/ws/config:ro
      - ${HAPPYPOSE_WEIGHTS:-../models/happypose}:/ws/models/happypose
      - ${MEGAPOSE_MESHES:-../models/megapose/meshes}:/ws/models/megapose/meshes
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        cd /ws && colcon build --packages-select megapose_ros2_wrapper &&
        source /ws/install/setup.bash &&
        echo '[MegaPose] Container ready.' &&
        ros2 launch megapose_ros2_wrapper megapose.launch.py ${MEGAPOSE_CAMERA_CONFIG:+camera_config:=$MEGAPOSE_CAMERA_CONFIG}
      "

  # -----------------------------------------------------------------------
  # SAM2 — Segment Anything Model 2 for instance segmentation
  # Needs: PyTorch 2.5 + Meta SAM2. Uses a dedicated Dockerfile target
  # (sam2-runtime) so the PyTorch pin does not clash with other services.
  # -----------------------------------------------------------------------
  sam2:
    <<: *gpu-common
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: sam2-runtime
    image: perspective_grasp/sam2:latest
    container_name: pg_sam2
    volumes:
      - ../packages/phase4_refinement/sam2_instance_segmentor:/ws/src/sam2_instance_segmentor
      - ../packages/bringup/perception_bringup/config:/ws/config:ro
      - ${SAM2_WEIGHTS:-../models/sam2}:/ws/models/sam2
    # SAM2_CAMERA_CONFIG selects the camera topology:
    #   unset / empty  → one non-namespaced /sam2_segmentor (single-cam default)
    #   /ws/config/camera_config_1cam.yaml → same (empty ns in that file)
    #   /ws/config/camera_config_2cam.yaml → /cam0 + /cam1 fan-out
    #   /ws/config/camera_config.yaml      → /cam0 + /cam1 + /cam2 fan-out
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        cd /ws && colcon build --packages-select sam2_instance_segmentor &&
        source /ws/install/setup.bash &&
        echo '[SAM2] Container ready.' &&
        ros2 launch sam2_instance_segmentor sam2_segmentor.launch.py ${SAM2_CAMERA_CONFIG:+camera_config:=$SAM2_CAMERA_CONFIG}
      "

  # -----------------------------------------------------------------------
  # BundleSDF — unknown-object 6D tracker via neural implicit surfaces
  # Needs: PyTorch 2.6 + kaolin 0.17 + nvdiffrast 0.3.3 + PyTorch3D v0.7.9
  # + Open3D + NVlabs/BundleSDF clone (built in stage).
  # Weights mount: $BUNDLESDF_WEIGHTS → /ws/models/bundlesdf
  #   expected layout:
  #     out/                         # per-track SDF / debug outputs (writable)
  #     weights/                     # optional pretrained NeRF / scorer weights
  # Config mount: perception_bringup/config → /ws/config (read-only) so
  #   camera_config*.yaml is available to the launch file.
  # BUNDLESDF_CAMERA_CONFIG selects the camera topology:
  #   unset / empty  → one non-namespaced /bundlesdf_tracker (1-cam)
  #   /ws/config/camera_config_2cam.yaml → /cam0 + /cam1 fan-out
  #   /ws/config/camera_config.yaml      → /cam0 + /cam1 + /cam2 fan-out
  # -----------------------------------------------------------------------
  bundlesdf:
    <<: *gpu-common
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: bundlesdf-runtime
    image: perspective_grasp/bundlesdf:latest
    container_name: pg_bundlesdf
    volumes:
      - ../packages/phase4_refinement/bundlesdf_unknown_tracker:/ws/src/bundlesdf_unknown_tracker
      - ../packages/bringup/perception_bringup/config:/ws/config:ro
      - ${BUNDLESDF_WEIGHTS:-../models/bundlesdf}:/ws/models/bundlesdf
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        cd /ws && colcon build --packages-select bundlesdf_unknown_tracker &&
        source /ws/install/setup.bash &&
        echo '[BundleSDF] Container ready.' &&
        ros2 launch bundlesdf_unknown_tracker bundlesdf.launch.py ${BUNDLESDF_CAMERA_CONFIG:+camera_config:=$BUNDLESDF_CAMERA_CONFIG}
      "
