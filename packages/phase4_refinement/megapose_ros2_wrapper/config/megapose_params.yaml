# '/**' = wildcard node matcher: applies whether this file is loaded into
# '/megapose_tracker' (single-cam / no-arg) or
# '/cam{N}/megapose_tracker' (multi-camera fan-out from
# megapose.launch.py).
/**:
  ros__parameters:
    # ── Backend selection ────────────────────────────────────────────
    # 'megapose' — happypose/MegaPose (GPU, runs in Docker service)
    # 'mock'     — bbox-centre at fixed depth (CPU, smoke test only)
    backend: "megapose"

    # ── Topics ───────────────────────────────────────────────────────
    image_topic:        "/camera/color/image_raw"
    camera_info_topic:  "/camera/color/camera_info"
    detections_topic:   "/yolo/detections"
    poses_topic:        "/megapose/raw_poses"

    # ── Frame / detection pairing ────────────────────────────────────
    image_queue_size:         10
    sync_tolerance_sec:       0.05
    min_detection_confidence: 0.0

    # ── MegaPose backend ─────────────────────────────────────────────
    # dataset_dir sets HAPPYPOSE_DATA_DIR inside the container (shared
    # with CosyPose). mesh_dir points to a flat folder of
    # `<class_name>.(obj|ply)` meshes — the same layout FoundationPose
    # uses, so they can share a single mesh tree. model_name keys into
    # happypose NAMED_MODELS; its entry carries the real
    # inference_parameters (n_refiner_iterations, n_pose_hypotheses)
    # so no hand-tuned iteration count lives here.
    dataset_dir:          "/ws/models/happypose"
    mesh_dir:             "/ws/models/megapose/meshes"
    mesh_units:           "mm"
    model_name:           "megapose-1.0-RGB-multi-hypothesis"
    score_threshold:      0.3
    device:               "cuda"
    # happypose load_named_model knobs — tune for VRAM headroom on
    # smaller GPUs. Defaults match upstream (n_workers=4, bsz_images=128).
    n_workers:            4
    bsz_images:           128
