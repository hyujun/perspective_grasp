# '/**' = wildcard node matcher: applies whether this file is loaded into
# '/sam2_segmentor' (single-cam / no-arg) or '/cam{N}/sam2_segmentor'
# (multi-camera fan-out from sam2_segmentor.launch.py).
/**:
  ros__parameters:
    # ── Backend selection ────────────────────────────────────────────
    # 'sam2' — Meta SAM2 (requires GPU, runs in Docker service)
    # 'mock' — elliptical mask per box (CPU, smoke testing only)
    backend: "sam2"

    # ── Topics ───────────────────────────────────────────────────────
    image_topic:       "/camera/color/image_raw"
    detections_topic:  "/yolo/detections"
    masks_topic:       "/sam2/masks"

    # ── Image/detection pairing ─────────────────────────────────────
    image_queue_size:     10
    sync_tolerance_sec:   0.05      # max |t_image - t_detections|
    min_detection_confidence: 0.0

    # ── SAM2 backend ────────────────────────────────────────────────
    # Path is inside the container (see docker-compose volume mount).
    model_checkpoint: "/ws/models/sam2/sam2_hiera_large.pt"
    model_config:     "sam2_hiera_l.yaml"
    device:           "cuda"
    pred_iou_thresh:  0.88
    multimask_output: false
