# camera_config_1cam.yaml — Single camera (development / backward compatible)
# Empty namespace preserves original topic names exactly.

perception_system:
  ros__parameters:
    base_frame: "base"

    cameras:
      - id: 0
        namespace: ""
        type: "eye_in_hand"
        serial: ""
        role: "primary"
        resolution: "640x480"
        fps: 30
        sync_mode: 0
        frame_id: "camera_color_optical_frame"

    association:
      distance_threshold: 0.05
      lambda_rot: 0.1
      temporal_threshold: 0.10
      max_snapshot_age_ms: 50.0
      rate_hz: 30.0
      stale_object_timeout_sec: 3.0

    merge:
      voxel_leaf_size: 0.002
      table_height: 0.0
      max_object_height: 0.30
      outlier_mean_k: 30
      outlier_stddev: 1.5
      overlap_radius: 0.005
      sync_slop_ms: 5.0
