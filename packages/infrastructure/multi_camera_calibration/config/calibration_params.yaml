multi_camera_calibration:
  ros__parameters:
    num_cameras: 3
    camera_namespaces: ["/cam0", "/cam1", "/cam2"]
    camera_types: ["eye_in_hand", "eye_to_hand", "eye_to_hand"]
    charuco:
      squares_x: 7
      squares_y: 5
      square_length: 0.04
      marker_length: 0.03
      dictionary: "DICT_6X6_250"
    min_samples: 30
    joint_state_topic: /joint_states
    # Empty default → launch file injects <repo>/runtime_outputs/calibration
    # (override via PERSPECTIVE_GRASP_RUNTIME_OUTPUTS_DIR env var or by
    # passing output_dir directly when launching the node standalone).
    output_dir: ""
