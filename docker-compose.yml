      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - ./cosypose_scene_optimizer:/ws/src/cosypose_scene_optimizer
      - ./megapose_ros2_wrapper:/ws/src/megapose_ros2_wrapper
      - ${COSYPOSE_WEIGHTS:-./models/cosypose}:/ws/models/cosypose
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
