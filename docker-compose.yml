      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - ./sam2_instance_segmentor:/ws/src/sam2_instance_segmentor
      - ${SAM2_WEIGHTS:-./models/sam2}:/ws/models/sam2
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
