  # -----------------------------------------------------------------------
  # BundleSDF — unknown object tracking via neural implicit surfaces
  # Needs: Open3D + PyTorch3D + kaolin + many custom deps
  # -----------------------------------------------------------------------
  bundlesdf:
    build:
      context: .
      dockerfile: Dockerfile
