# =============================================================================
# perspective_grasp - Docker Compose (ML nodes only)
#
# Host runs: C++ nodes, camera drivers, ur5e controller, RViz2, YOLO
# Docker runs: GPU-heavy Python ML nodes with complex dependencies
#
# Usage:
#   docker compose build                     # Build all images
#   docker compose up foundationpose -d      # Start one service
#   docker compose up -d                     # Start all ML nodes
#   docker compose logs -f foundationpose    # View logs
#   docker compose down                      # Stop all
#
# Model weights:
#   Set env vars or place weights in ./models/<service>/
#   e.g., export FOUNDATIONPOSE_WEIGHTS=/path/to/weights
# =============================================================================

x-gpu-common: &gpu-common
  build:
    context: .
    dockerfile: Dockerfile
    target: ml-base
  image: perspective_grasp/ml-base:latest
  network_mode: host
  ipc: host
  restart: unless-stopped
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  environment: &gpu-env
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: all
    ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}

services:
  # -----------------------------------------------------------------------
  # FoundationPose — NVIDIA Isaac FoundationPose 6D tracker
  # Needs: PyTorch + kaolin + nvdiffrast + specific CUDA ops
  # -----------------------------------------------------------------------
  foundationpose:
    <<: *gpu-common
    container_name: pg_foundationpose
    volumes:
      - ./isaac_foundationpose_tracker:/ws/src/isaac_foundationpose_tracker
      - ${FOUNDATIONPOSE_WEIGHTS:-./models/foundationpose}:/ws/models/foundationpose
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ws/install/setup.bash &&
        echo '[FoundationPose] Container ready.' &&
        ros2 launch isaac_foundationpose_tracker foundationpose.launch.py
      "

  # -----------------------------------------------------------------------
  # MegaPose / CosyPose — scene-level pose optimization
  # Needs: happypose (megapose + cosypose), specific torch + cuda combo
  # -----------------------------------------------------------------------
  cosypose:
    <<: *gpu-common
    container_name: pg_cosypose
    volumes:
      - ./cosypose_scene_optimizer:/ws/src/cosypose_scene_optimizer
      - ./megapose_ros2_wrapper:/ws/src/megapose_ros2_wrapper
      - ${COSYPOSE_WEIGHTS:-./models/cosypose}:/ws/models/cosypose
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ws/install/setup.bash &&
        echo '[CosyPose/MegaPose] Container ready.' &&
        ros2 launch cosypose_scene_optimizer cosypose.launch.py
      "

  # -----------------------------------------------------------------------
  # SAM2 — Segment Anything Model 2 for instance segmentation
  # Needs: PyTorch + segment-anything-2 + specific model checkpoints
  # -----------------------------------------------------------------------
  sam2:
    <<: *gpu-common
    container_name: pg_sam2
    volumes:
      - ./sam2_instance_segmentor:/ws/src/sam2_instance_segmentor
      - ${SAM2_WEIGHTS:-./models/sam2}:/ws/models/sam2
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ws/install/setup.bash &&
        echo '[SAM2] Container ready.' &&
        ros2 launch sam2_instance_segmentor sam2_segmentor.launch.py
      "

  # -----------------------------------------------------------------------
  # BundleSDF — unknown object tracking via neural implicit surfaces
  # Needs: Open3D + PyTorch3D + kaolin + many custom deps
  # -----------------------------------------------------------------------
  bundlesdf:
    <<: *gpu-common
    container_name: pg_bundlesdf
    volumes:
      - ./bundlesdf_unknown_tracker:/ws/src/bundlesdf_unknown_tracker
      - ${BUNDLESDF_WEIGHTS:-./models/bundlesdf}:/ws/models/bundlesdf
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ws/install/setup.bash &&
        echo '[BundleSDF] Container ready.' &&
        ros2 launch bundlesdf_unknown_tracker bundlesdf.launch.py
      "
